services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///data/fitlog.db
      - REDIS_URL=redis://redis:6379/0
      - APP_ENV=production
      - SECRET_KEY
      - GROQ_API_KEY
    ports:
      - "8000:8000"
    volumes:
      - db_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    environment:
      - API_BASE=http://api:8000
      - PUBLIC_API_BASE
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy

volumes:
  db_data:
  redis_data:
