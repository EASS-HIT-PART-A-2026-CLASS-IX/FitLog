databases:
  - name: fitlog-db
    databaseName: fitlog
    user: fitlog
    plan: free          # 256 MB, free for 90 days on Render

services:
  # ── Backend API ──────────────────────────────────────────────
  - type: web
    name: fitlog-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    region: oregon
    plan: free
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fitlog-db
          property: connectionString   # render gives postgresql://... we fix the prefix in code
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true            # Render auto-generates a secure random value
      - key: GROQ_API_KEY
        sync: false                    # Set manually in Render dashboard
      - key: REDIS_URL
        value: ""                      # leave blank — falls back to in-process cache
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"

  # ── Streamlit Frontend ───────────────────────────────────────
  - type: web
    name: fitlog-frontend
    runtime: docker
    dockerfilePath: ./Dockerfile.frontend
    dockerContext: .
    region: oregon
    plan: free
    envVars:
      # After first deploy: copy the fitlog-api public URL and paste it here
      # e.g. https://fitlog-api.onrender.com
      - key: API_BASE
        sync: false
