services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite+aiosqlite:///data/fitlog.db
      REDIS_URL: redis://redis:6379/0
      GROQ_API_KEY: ${GROQ_API_KEY}
      SECRET_KEY: ${SECRET_KEY}
      APP_ENV: production
    ports:
      - "8000:8000"
    volumes:
      - db_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    environment:
      # Server-side Python calls go through internal Docker network
      API_BASE: http://api:8000
      # Browser-side JS calls — must be reachable from the user's browser
      # Change to your server's public IP/domain when deploying remotely
      PUBLIC_API_BASE: ${PUBLIC_API_BASE:-http://localhost:8000}
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy

volumes:
  db_data:
  redis_data:
