version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: fitlog-postgres
    environment:
      POSTGRES_USER: fitlog
      POSTGRES_PASSWORD: fitlog_password
      POSTGRES_DB: fitlog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitlog"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: fitlog-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fitlog-api
    environment:
      DATABASE_URL: postgresql+asyncpg://fitlog:fitlog_password@postgres:5432/fitlog
      REDIS_URL: redis://redis:6379/0
      GROQ_API_KEY: ${GROQ_API_KEY}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app

  # Celery Worker for async tasks
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fitlog-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://fitlog:fitlog_password@postgres:5432/fitlog
      REDIS_URL: redis://redis:6379/0
      GROQ_API_KEY: ${GROQ_API_KEY}
    depends_on:
      - redis
      - postgres
    command: uv run celery -A app.tasks worker --loglevel=info
    volumes:
      - .:/app

volumes:
  postgres_data:
  redis_data:
